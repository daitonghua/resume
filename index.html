    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "Microsoft YaHei", "Arial", sans-serif;
    }
    body {
      background: #f9f9f9;
      color: #333;
      line-height: 1.6;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
      position: relative;
    }
    /* 全局链接样式：适用于简历正文中的所有 <a> */
    .container a {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }
    .container a:hover {
      color: var(--accent-color);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }


    /* 语言切换按钮 */
    .lang-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }
    .lang-btn {
      padding: 4px 10px;
      font-size: 12px;
      background: #e0e0e0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: #3498db;
      color: white;
    }

header {
  background: #2c3e50;
  color: white;
  padding: 20px; /* 减少内边距以适应新布局 */
  display: flex;
  align-items: center; /* 垂直居中对齐 */
  position: relative;
}

.avatar {
  width: 160px; /* 放大头像尺寸 */
  height: 160px; /* 放大头像尺寸 */
  border-radius: 50%;
  border: 4px solid #3498db;
  overflow: hidden;
  margin-right: 50px; /* 给头像和信息之间留出间距 */
  background: #ddd;
  flex-shrink: 0; /* 防止头像被压缩 */
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.info {
  /* 让信息内容左对齐 */
}

h1 {
  font-size: 32px;
  margin-bottom: 8px;
  margin-top: 0; /* 确保没有多余的顶部外边距 */
}

.title {
  color: #3498db;
  font-size: 20px;
  margin-bottom: 15px;
}

.contact-info {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  margin-top: 10px;
  font-size: 14px;
}

    

    .section {
      padding: 25px 30px;
      border-bottom: 1px solid #eee;
    }
    .section:last-child {
      border-bottom: none;
    }
    h2 {
      color: #2d3958;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid #3498db;
      font-size: 24px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .skill-tag {
      background: #e1f0fa;
      color: #2980b9;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
    }

    .experience-item, .education-item {
      margin-bottom: 20px;
    }
    .item-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .job-title, .degree {
      font-weight: bold;
      font-size: 18px;
    }
    .company, .school {
      color: #3498db;
      margin: 4px 0;

    }

      color: #7f8c8d;
      font-style: italic;
      white-space: nowrap;
    }
    .major {
      color: #2980b9;
      font-weight: normal;
      font-style: italic;
      margin: 4px 0;

    .gpa {
      color: #27ae60;
      font-weight: bold;

    .thesis {
      margin-top: 8px;

    ul {

    li {

    .footer {

      padding: 20px;
      color: #7f8c8d;
      font-size: 14px;

      .date {

        right: 10px;

    function render(lang) {
      const data = resumeData[lang];
      if (!data) return;

      document.getElementById('contactInfo').innerHTML = data.contact.map(item => `<span>${item}</span>`).join('');
      
      document.getElementById('skillsTitle').textContent = data.skillsTitle;
      document.getElementById('skillsList').innerHTML = data.skills.map(skill => 
        `<span class="skill-tag">${skill}</span>`
      ).join('');

      document.getElementById('experienceTitle').textContent = data.experienceTitle;
      document.getElementById('experienceList').innerHTML = data.experience.map(exp => `
        <div class="experience-item">
          <div class="item-header">
            <div>
              <div class="job-title">${exp.title}</div>
              <div class="company">${exp.company}</div>
            </div>
            <div class="date">${exp.date}</div>
          </div>
          <ul>
            ${exp.duties.map(d => `<li>${d}</li>`).join('')}
          </ul>
        </div>
      `).join('');

      document.getElementById('educationTitle').textContent = data.educationTitle;
      document.getElementById('educationList').innerHTML = data.education.map(edu => `
        <div class="education-item">
          <div class="item-header">
            <div>
              <div class="job-title">${edu.degree}</div>
              <div class="company">${edu.school}</div>
            </div>
            <div class="date">${edu.date}</div>
          </div>
          ${edu.content ? `
            <ul>
              ${edu.content.map(c => `<li>${c}</li>`).join('')}
            </ul>
          ` : ''}
        </div>
      `).join('');

      document.getElementById('awardsTitle').textContent = data.awardsTitle || '';
      document.getElementById('awardsList').innerHTML = data.awards 
        ? data.awards.map(award => `<li>${award}</li>`).join('')
        : '';
        
        // 渲染 Publications
      document.getElementById('publicationsTitle').textContent = data.publicationsTitle || '';
      document.getElementById('publicationsList').innerHTML = data.publications 
        ? data.publications.map(pub => `<li>${pub}</li>`).join('')
        : '';

      // 渲染 Conferences
      document.getElementById('conferencesTitle').textContent = data.conferencesTitle || '';
      document.getElementById('conferencesList').innerHTML = data.conferences 
        ? data.conferences.map(conf => `<li>${conf}</li>`).join('')
        : '';


      document.getElementById('footerText').textContent = data.footer;

      // 更新按钮状态
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      currentLang = lang;
    }

    // ======================
    // 事件绑定
    // ======================
    document.getElementById('langSwitcher').addEventListener('click', (e) => {
      if (e.target.classList.contains('lang-btn')) {
        const lang = e.target.dataset.lang;
        render(lang);
      }
    });

    // 初始渲染
    render(currentLang);
  </script>
</body>
</html>
